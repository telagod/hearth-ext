<style>
  .lost {
    min-height: 70vh;
    display: grid; place-items: center;

  .lost-glyph {
    width: 80px; height: 80px;
    border-radius: 24px;

    color: rgba(20,18,15,0.85);
    opacity: 0.32;
    filter: grayscale(0.4);
  }
  .lost-glyph svg { width: 44px; height: 44px; }
  .lost-code {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--ember-400);
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .lost h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .lost p {
    color: var(--text-secondary);
    max-width: 460px;
    margin: 0 auto 32px;
    font-size: 15.5px;
    line-height: 1.75;
  }
  .lost .cta-row { display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
